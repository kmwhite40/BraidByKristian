name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer push supersedes an in-flight run on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      # `version` is pinned here rather than inherited from a `packageManager`
      # field in package.json. That field made corepack refuse to run on
      # Hostinger, whose corepack ships a different pnpm and will not switch
      # versions. CI pins its own pnpm; the host uses whatever it ships.
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Unit tests
        run: pnpm run test

      # No secrets are required to build. If this step ever starts needing one,
      # that is a regression — the site must build from a clean checkout.
      - name: Build
        run: pnpm run build

  e2e:
    name: Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # webkit is required: the mobile-390 project uses the iPhone 13 device
      # descriptor, which runs on WebKit, not Chromium.
      - name: Install browsers
        run: pnpm exec playwright install --with-deps chromium webkit

      # playwright.config.ts builds and serves the app itself.
      - name: Run E2E
        run: pnpm run test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Advisory: a transitive low-severity finding should not block a hotfix.
      - run: pnpm audit --audit-level high
        continue-on-error: true
